<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HubSpot Pipeline Dashboard</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; }
.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: white; padding: 24px 32px; }
.header h1 { font-size: 24px; margin-bottom: 4px; }
.header p { color: #8892b0; font-size: 14px; }
.header .url { color: #667eea; font-size: 13px; margin-top: 8px; }
.stats { display: flex; gap: 16px; padding: 20px 32px; }
.stat-card { background: white; border-radius: 12px; padding: 16px 24px; flex: 1; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
.stat-card .num { font-size: 28px; font-weight: 700; color: #1a1a2e; }
.stat-card .label { font-size: 13px; color: #64748b; margin-top: 2px; }
.container { max-width: 1400px; margin: 0 auto; padding: 0 32px 40px; }
.controls { margin: 20px 0; display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
.search-box { padding: 10px 16px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; flex: 1; min-width: 200px; outline: none; }
.search-box:focus { border-color: #667eea; box-shadow: 0 0 0 3px rgba(102,126,234,.15); }
.owner-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(380px, 1fr)); gap: 16px; }
.owner-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 1px 3px rgba(0,0,0,.08); cursor: pointer; transition: all .2s; border: 2px solid transparent; }
.owner-card:hover { border-color: #667eea; box-shadow: 0 4px 12px rgba(102,126,234,.2); transform: translateY(-2px); }
.owner-card .top { display: flex; justify-content: space-between; align-items: start; margin-bottom: 12px; }
.owner-card .name { font-size: 16px; font-weight: 600; }
.owner-card .email { font-size: 12px; color: #64748b; margin-top: 2px; }
.owner-card .badge { background: #667eea; color: white; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.owner-card .deal { padding: 8px 0; border-bottom: 1px solid #f1f5f9; font-size: 13px; display: flex; justify-content: space-between; }
.owner-card .deal:last-child { border-bottom: none; }
.owner-card .deal .name { font-weight: 500; }
.owner-card .deal .meta { color: #64748b; font-size: 12px; }
.owner-card .deal .amount { font-weight: 600; color: #059669; }
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 100; }
.modal-overlay.active { display: flex; align-items: center; justify-content: center; }
.modal { background: white; border-radius: 16px; width: 90%; max-width: 700px; max-height: 85vh; overflow-y: auto; padding: 28px; box-shadow: 0 20px 60px rgba(0,0,0,.3); }
.modal h2 { font-size: 20px; margin-bottom: 4px; }
.modal .sub { color: #64748b; font-size: 13px; margin-bottom: 16px; }
.modal .close { float: right; background: none; border: none; font-size: 24px; cursor: pointer; color: #94a3b8; }
.modal .close:hover { color: #1a1a2e; }
.modal table { width: 100%; border-collapse: collapse; }
.modal th { text-align: left; font-size: 12px; text-transform: uppercase; color: #64748b; padding: 8px 12px; border-bottom: 2px solid #e2e8f0; }
.modal td { padding: 10px 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
.modal tr:hover td { background: #f8fafc; }
.loading { text-align: center; padding: 60px; color: #64748b; }
.error { text-align: center; padding: 60px; color: #dc2626; }
footer { text-align: center; padding: 20px; color: #94a3b8; font-size: 12px; }
</style>
</head>
<body>
<div class="header">
  <h1>📊 HubSpot Pipeline Dashboard</h1>
  <p>Real-time view of all open deals grouped by owner</p>
  <div class="url" id="apiUrlDisplay">Loading...</div>
</div>

<div class="stats" id="stats">
  <div class="stat-card"><div class="num" id="totalDeals">—</div><div class="label">Open Deals</div></div>
  <div class="stat-card"><div class="num" id="totalOwners">—</div><div class="label">Active Owners</div></div>
  <div class="stat-card"><div class="num" id="totalValue">—</div><div class="label">Pipeline Value</div></div>
</div>

<div class="container">
  <div class="controls">
    <input class="search-box" id="search" placeholder="🔍 Search owner by name..." oninput="filterOwners()">
    <select id="sortSelect" onchange="renderOwners()" style="padding:10px 16px;border:1px solid #e2e8f0;border-radius:8px;font-size:14px;background:white;">
      <option value="deals">Sort by deals</option>
      <option value="value">Sort by value</option>
      <option value="name">Sort by name</option>
    </select>
  </div>
  <div id="loading" class="loading">Loading HubSpot data...</div>
  <div id="error" class="error" style="display:none"></div>
  <div id="ownerGrid" class="owner-grid" style="display:none"></div>
  <footer>Data from <a href="https://developers.hubspot.com/" target="_blank" style="color:#667eea">HubSpot API</a> · Private App</footer>
</div>

<div class="modal-overlay" id="modal">
  <div class="modal">
    <button class="close" onclick="closeModal()">×</button>
    <h2 id="modalName"></h2>
    <div class="sub" id="modalSub"></div>
    <div style="overflow-x:auto">
      <table><thead><tr>
        <th>Deal Name</th><th>Amount</th><th>Stage</th><th>Created</th><th>Last Modified</th>
      </tr></thead><tbody id="modalBody"></tbody></table>
    </div>
  </div>
</div>

<script>
const API_BASE = window.API_BASE_URL || 'http://43.130.41.150:5000/api';
document.getElementById('apiUrlDisplay').textContent = '🔗 API: ' + API_BASE.replace('/api','');

let dashboardData = null;
let authToken = null;

async function login() {
  const res = await fetch(API_BASE + '/auth/login', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({email:'admin@flashlabs.ai', password:'flashclaw123'})
  });
  if (!res.ok) throw new Error('Login failed: ' + res.status);
  const data = await res.json();
  authToken = data.access_token;
}

async function loadDashboard() {
  document.getElementById('loading').style.display = 'block';
  document.getElementById('error').style.display = 'none';
  try {
    if (!authToken) {
      await login();
    }
    const res = await fetch(API_BASE + '/hubspot/dashboard', {
      headers: {'Authorization': 'Bearer ' + authToken}
    });
    if (res.status === 401) {
      await login();
      return loadDashboard();
    }
    if (!res.ok) throw new Error('HTTP ' + res.status);
    dashboardData = await res.json();
    if (dashboardData.error) throw new Error(dashboardData.error);
    
    document.getElementById('loading').style.display = 'none';
    document.getElementById('ownerGrid').style.display = 'grid';
    
    const totalVal = dashboardData.owners.reduce((s,o) => s + (o.total_value || 0), 0);
    document.getElementById('totalDeals').textContent = dashboardData.total_open.toLocaleString();
    document.getElementById('totalOwners').textContent = dashboardData.total_owners;
    document.getElementById('totalValue').textContent = '$' + totalVal.toLocaleString();
    
    renderOwners();
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').textContent = '❌ ' + e.message;
  }
}

function renderOwners() {
  if (!dashboardData) return;
  let owners = [...dashboardData.owners];
  const sort = document.getElementById('sortSelect').value;
  if (sort === 'deals') owners.sort((a,b) => b.deal_count - a.deal_count);
  else if (sort === 'value') owners.sort((a,b) => (b.total_value || 0) - (a.total_value || 0));
  else owners.sort((a,b) => a.name.localeCompare(b.name));

  const grid = document.getElementById('ownerGrid');
  grid.innerHTML = owners.map(o => {
    const deals = (o.latest_deals || []).slice(0, 5);
    return '<div class="owner-card" onclick="showOwner(\'' + o.id + '\',\'' + o.name.replace(/'/g,"") + '\')">' +
      '<div class="top"><div><div class="name">' + o.name + '</div>' +
      (o.email ? '<div class="email">' + o.email + '</div>' : '') + '</div>' +
      '<span class="badge">' + o.deal_count + ' deals · $' + (o.total_value||0).toLocaleString() + '</span></div>' +
      deals.map(d => '<div class="deal"><div><div class="name">' + d.name + '</div><div class="meta">' + (d.stage || d.stage_id || '') + '</div></div><div class="amount">$' + (parseInt(d.amount||0)).toLocaleString() + '</div></div>').join('') +
      (o.deal_count > 5 ? '<div style="text-align:center;color:#667eea;font-size:12px;padding:4px 0">+ ' + (o.deal_count-5) + ' more →</div>' : '') +
      '</div>';
  }).join('');
}

function filterOwners() {
  const q = document.getElementById('search').value.toLowerCase();
  if (!q || !dashboardData) { renderOwners(); return; }
  const filtered = dashboardData.owners.filter(o => 
    o.name.toLowerCase().includes(q) || (o.email||'').toLowerCase().includes(q)
  );
  const save = dashboardData.owners;
  dashboardData.owners = filtered;
  renderOwners();
  dashboardData.owners = save;
}

async function showOwner(id, name) {
  document.getElementById('modalName').textContent = name;
  document.getElementById('modalSub').textContent = 'Loading...';
  document.getElementById('modalBody').innerHTML = '';
  document.getElementById('modal').classList.add('active');
  try {
    const res = await fetch(API_BASE + '/hubspot/owner/' + id + '/deals?limit=50', {
      headers: {'Authorization': 'Bearer ' + authToken}
    });
    const data = await res.json();
    const deals = data.deals || [];
    document.getElementById('modalSub').textContent = deals.length + ' open deals';
    document.getElementById('modalBody').innerHTML = deals.map(d => 
      '<tr><td><strong>' + d.name + '</strong></td>' +
      '<td><strong>$' + (parseInt(d.amount||0)).toLocaleString() + '</strong></td>' +
      '<td>' + (d.stage || d.stage_id || '') + '</td>' +
      '<td>' + (d.created || '') + '</td>' +
      '<td>' + (d.modified || '') + '</td></tr>'
    ).join('');
  } catch(e) {
    document.getElementById('modalSub').textContent = 'Error loading';
  }
}

function closeModal() {
  document.getElementById('modal').classList.remove('active');
}

document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
